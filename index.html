<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Robotnik Clicker</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ffdd00 0%, #c00 70%);
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
#app {
    background: #111;
    padding: 24px;
    border: 4px solid #ffdd00;
    border-radius: 16px;
    width: min(420px, 90vw);
    text-align: center;
}
h1 {
    margin: 0 0 16px;
    color: #ffdd00;
    text-shadow: 0 0 8px rgba(255,221,0,0.8);
}
#counter {
    font-size: 4rem;
    margin: 16px 0;
    color: #fff;
}
button {
    background: #ffdd00;
    border: none;
    color: #111;
    padding: 14px 18px;
    margin: 8px 0;
    width: 100%;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 8px;
}
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
#stats {
    margin-top: 16px;
    color: #eee;
}
</style>
</head>
<body>
<div id="app">
    <h1>Dr Robotnik Clicker</h1>
    <div id="counter">0</div>
    <button id="clicker">Smash the Egg</button>
    <div id="buttons">
        <button id="buyBot">Buy Robot Assistant (10)</button>
        <button id="buyDrill">Buy Drill Rig (50)</button>
    </div>
    <div id="stats">CPS: 0</div>
</div>
<audio id="smashSound" src="pingas.mp3" preload="auto"></audio>
<script>
let score = 0;
let cps = 0;
let botCount = 0;
let drillCount = 0;
const costs = { bot: 10, drill: 50 };
const rates = { bot: 1, drill: 5 };

const counterEl = document.getElementById('counter');
const statsEl = document.getElementById('stats');
const buyBotBtn = document.getElementById('buyBot');
const buyDrillBtn = document.getElementById('buyDrill');

function format(value) {
    return Math.floor(value);
}

function updateUI() {
    counterEl.textContent = format(score);
    statsEl.textContent = `CPS: ${cps}`;
    buyBotBtn.textContent = `Buy Robot Assistant (${costs.bot})`;
    buyDrillBtn.textContent = `Buy Drill Rig (${costs.drill})`;
    buyBotBtn.disabled = score < costs.bot;
    buyDrillBtn.disabled = score < costs.drill;
}

document.getElementById('clicker').addEventListener('click', () => {
    score += 1;
    document.getElementById('smashSound').play();
    updateUI();
});

buyBotBtn.addEventListener('click', () => {
    if (score < costs.bot) return;
    score -= costs.bot;
    botCount += 1;
    cps += rates.bot;
    costs.bot = Math.ceil(costs.bot * 1.25);
    updateUI();
});

buyDrillBtn.addEventListener('click', () => {
    if (score < costs.drill) return;
    score -= costs.drill;
    drillCount += 1;
    cps += rates.drill;
    costs.drill = Math.ceil(costs.drill * 1.3);
    updateUI();
});

setInterval(() => {
    score += cps / 10;
    updateUI();
}, 100);

updateUI();
</script>
</body>
</html>
