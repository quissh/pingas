<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Robotnik Clicker</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #ffdd00 0%, #c00 70%);
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
#app {
    background: #111;
    padding: 24px;
    border: 4px solid #ffdd00;
    border-radius: 16px;
    width: min(640px, 95vw);
    text-align: center;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: stretch;
}
#left-panel,
#right-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
}
#right-panel {
    gap: 12px;
}
h1 {
    margin: 0 0 16px;
    color: #ffdd00;
    text-shadow: 0 0 8px rgba(255,221,0,0.8);
    grid-column: 1 / -1;
}
#counter {
    font-size: 4rem;
    margin: 0 0 16px;
    color: #fff;
}
#click-count {
    margin-top: 12px;
    font-size: 1rem;
    color: #eee;
}
button {
    background: #ffdd00;
    border: none;
    color: #111;
    padding: 18px 20px;
    margin: 0;
    width: 100%;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 12px;
    position: relative;
}
#clicker {
    min-height: 260px;
    font-size: 1.3rem;
}
#clicker.sprite-button {
    background-image: url('robotnikhead.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    background-color: transparent;
    color: transparent;
    padding: 0;
    min-height: 280px;
}
#clicker.sprite-button:hover {
    background-color: transparent;
}
@keyframes zoom-pulse {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.1);
    }
    100% {
        transform: scale(1);
    }
}
#clicker.zoom-click {
    animation: zoom-pulse 0.3s ease-in-out;
}
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
#stats {
    grid-column: 1 / -1;
    margin-top: 16px;
    color: #eee;
}
#right-panel button {
    margin: 0;
}
#right-panel {
    justify-content: flex-start;
}
#right-panel button + button {
    margin-top: 12px;
}
#stats {
    justify-self: center;
}
#icon-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
    min-height: 60px;
    align-content: flex-start;
}
#robot-icons,
#drill-icons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: rgba(255, 221, 0, 0.1);
    border-radius: 8px;
    min-height: 50px;
    align-content: flex-start;
}
.icon {
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 2rem;
}
.icon.small {
    font-size: 1.4rem;
}
.icon.tiny {
    font-size: 1rem;
}
.overflow-text {
    color: #ffdd00;
    font-weight: bold;
    font-size: 1.4rem;
    padding: 0 4px;
}
</style>
</head>
<body>
<div id="app">
    <h1>Dr Robotnik Clicker</h1>
    <div id="left-panel">
        <div id="counter">0</div>
        <button id="clicker">Smash the Egg</button>
        <div id="click-count">Clicks: 0</div>
    </div>
    <div id="right-panel">
        <button id="buyBot">Buy Robot Assistant (10)</button>
        <div id="robot-icons"></div>
        <button id="buyDrill">Buy Drill Rig (50)</button>
        <div id="drill-icons"></div>
    </div>
    <div id="stats">CPS: 0</div>
</div>
<audio id="smashSound" src="pingas.mp3" preload="auto"></audio>
<script>
let score = 0;
let cps = 0;
let botCount = 0;
let drillCount = 0;
const costs = { bot: 10, drill: 50 };
const rates = { bot: 1, drill: 5 };

const counterEl = document.getElementById('counter');
const clickCountEl = document.getElementById('click-count');
const statsEl = document.getElementById('stats');
const buyBotBtn = document.getElementById('buyBot');
const buyDrillBtn = document.getElementById('buyDrill');
const clickerBtn = document.getElementById('clicker');
let clickCount = 0;

function format(value) {
    return Math.floor(value);
}

function updateUI() {
    counterEl.textContent = format(score);
    clickCountEl.textContent = `Clicks: ${clickCount}`;
    statsEl.textContent = `CPS: ${cps}`;
    buyBotBtn.textContent = `Buy Robot Assistant (${costs.bot})`;
    buyDrillBtn.textContent = `Buy Drill Rig (${costs.drill})`;
    buyBotBtn.disabled = score < costs.bot;
    buyDrillBtn.disabled = score < costs.drill;
}

const sprite = new Image();
sprite.src = 'robotnikhead.png';
sprite.onload = () => {
    clickerBtn.classList.add('sprite-button');
};

const robotIconsEl = document.getElementById('robot-icons');
const drillIconsEl = document.getElementById('drill-icons');
let botIconsOverflow = false;
let drillIconsOverflow = false;

function updateIconsDisplay(container, count, emoji) {
    container.innerHTML = '';
    if (count === 0) return;
    
    const maxIcons = 8;
    const iconsToShow = Math.min(count, maxIcons);
    
    let fontSize = 'normal';
    if (count > 8) fontSize = 'small';
    if (count > 15) fontSize = 'tiny';
    
    for (let i = 0; i < iconsToShow; i++) {
        const icon = document.createElement('div');
        icon.className = `icon ${fontSize !== 'normal' ? fontSize : ''}`;
        icon.textContent = emoji;
        container.appendChild(icon);
    }
    
    if (count > maxIcons) {
        const overflow = document.createElement('div');
        overflow.className = 'overflow-text';
        overflow.textContent = '...';
        container.appendChild(overflow);
    }
}

clickerBtn.addEventListener('click', () => {
    score += 1;
    clickCount += 1;
    
    clickerBtn.classList.remove('zoom-click');
    void clickerBtn.offsetWidth;
    clickerBtn.classList.add('zoom-click');
    
    const sound = document.getElementById('smashSound');
    sound.currentTime = 0;
    sound.play();
    updateUI();
});

buyBotBtn.addEventListener('click', () => {
    if (score < costs.bot) return;
    score -= costs.bot;
    botCount += 1;
    cps += rates.bot;
    costs.bot = Math.ceil(costs.bot * 1.25);
    updateIconsDisplay(robotIconsEl, botCount, '🤖');
    updateUI();
});

buyDrillBtn.addEventListener('click', () => {
    if (score < costs.drill) return;
    score -= costs.drill;
    drillCount += 1;
    cps += rates.drill;
    costs.drill = Math.ceil(costs.drill * 1.3);
    updateIconsDisplay(drillIconsEl, drillCount, '🏠');
    updateUI();
});

setInterval(() => {
    score += cps / 10;
    updateUI();
}, 100);

updateUI();
</script>
</body>
</html>
