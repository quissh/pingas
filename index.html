<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dr Robotnik Clicker</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    animation: colorCycle 10.5s infinite ease-in-out;
}

@keyframes colorCycle {
    0% {
        background: radial-gradient(circle at top, #ffdd00 0%, #c00 70%);
    }
    14% {
        background: radial-gradient(circle at top, #ff6b6b 0%, #cc0000 70%);
    }
    28% {
        background: radial-gradient(circle at top, #ff9500 0%, #ff6b00 70%);
    }
    42% {
        background: radial-gradient(circle at top, #00ff00 0%, #00aa00 70%);
    }
    56% {
        background: radial-gradient(circle at top, #00ddff 0%, #0066ff 70%);
    }
    70% {
        background: radial-gradient(circle at top, #0044ff 0%, #000088 70%);
    }
    84% {
        background: radial-gradient(circle at top, #dd00ff 0%, #8800cc 70%);
    }
    100% {
        background: radial-gradient(circle at top, #ffdd00 0%, #c00 70%);
    }
}
#app {
    background: transparent;
    padding: 0;
    border: none;
    border-radius: 0;
    width: min(95vw, 1200px);
    text-align: center;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 40px;
    align-items: center;
}
#left-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
#right-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
}
h1 {
    margin: 0 0 16px;
    color: #ffdd00;
    text-shadow: 0 0 8px rgba(255,221,0,0.8);
    grid-column: 1 / -1;
}
#counter {
    font-size: 5rem;
    margin: 0;
    color: #fff;
    font-weight: bold;
}
#click-count {
    margin-top: 8px;
    font-size: 1.2rem;
    color: #eee;
}
button {
    background: #ffdd00;
    border: none;
    color: #111;
    padding: 18px 20px;
    margin: 0;
    width: 100%;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 12px;
    position: relative;
}
#clicker {
    min-height: 400px;
    min-width: 400px;
    font-size: 1.3rem;
    margin: 0 auto;
    animation: swing 3s ease-in-out infinite;
    transform-origin: top center;
}
@keyframes swing {
    0%, 100% {
        transform: rotateZ(-3deg);
    }
    50% {
        transform: rotateZ(3deg);
    }
}
#clicker.sprite-button {
    background-image: url('robotnikhead.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    background-color: transparent;
    color: transparent;
    padding: 0;
    font-size: 0;
    min-height: 450px;
    min-width: 450px;
}
#clicker.sprite-button:hover {
    background-color: transparent;
}
@keyframes zoom-pulse {
    0% {
        transform: rotateZ(-3deg) scale(1);
    }
    50% {
        transform: rotateZ(-2.5deg) scale(1.1);
    }
    100% {
        transform: rotateZ(-2deg) scale(1);
    }
}
#clicker.zoom-click {
    animation: zoom-pulse 0.3s ease-in-out !important;
}
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
#stats {
    grid-column: 1 / -1;
    margin-top: 16px;
    color: #eee;
}
#right-panel button {
    margin: 0;
}
#right-panel button + button {
    margin-top: 0;
}
#stats {
    justify-self: center;
}
#support-box {
    position: absolute;
    top: 24px;
    left: 24px;
    max-width: 320px;
    padding: 16px 18px;
    background: transparent;
    border: none;
    border-radius: 18px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
    z-index: 10;
}
#support-text {
    color: #111;
    font-weight: 800;
    font-size: 1.35rem;
    line-height: 1.3;
    margin-bottom: 14px;
    display: inline-block;
    text-shadow: 0 0 8px rgba(255,255,255,0.7);
    animation: support-wave 3s ease-in-out infinite;
}
@keyframes support-wave {
    0%, 100% {
        transform: translateX(0);
    }
    25% {
        transform: translateX(-4px) skewX(-2deg);
    }
    50% {
        transform: translateX(4px) skewX(2deg);
    }
    75% {
        transform: translateX(-2px) skewX(-1deg);
    }
}
.support-link {
    display: block;
    text-decoration: none;
    color: #111;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 8px 0;
    border-radius: 12px;
    background: transparent;
    border: none;
    margin-top: 10px;
    transition: transform 0.2s ease;
}
.support-link:hover {
    transform: translateX(4px);
}
.support-link::before {
    content: '';
}

#icon-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0;
    min-height: 60px;
    align-content: flex-start;
}
#robot-icons,
#drill-icons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px;
    background: rgba(255, 221, 0, 0.15);
    border-radius: 8px;
    min-height: 80px;
    align-content: flex-start;
}
.icon {
    font-size: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 2.5rem;
}
.icon.small {
    font-size: 1.8rem;
}
.icon.tiny {
    font-size: 1.2rem;
}
.overflow-text {
    color: #ffdd00;
    font-weight: bold;
    font-size: 1.8rem;
    padding: 0 4px;
}
</style>
</head>
<body>
<div id="support-box">
    <div id="support-text">support a buddy! ^_^</div>
    <a class="support-link" href="https://x.com/sonicwavecyclic" target="_blank" rel="noopener">🐦 Twitter</a>
    <a class="support-link" href="https://steamcommunity.com/id/quissh" target="_blank" rel="noopener">🎮 Steam</a>
</div>
<div id="app">
    <div id="left-panel">
        <button id="clicker">Smash the Egg</button>
    </div>
    <div id="right-panel">
        <h1>Dr Robotnik Clicker</h1>
        <div id="counter">0</div>
        <div id="click-count">Clicks: 0</div>
        <button id="buyBot">Buy Robot Assistant (10)</button>
        <div id="robot-icons"></div>
        <button id="buyDrill">Buy Drill Rig (50)</button>
        <div id="drill-icons"></div>
        <div id="stats">CPS: 0</div>
    </div>
</div>
<audio id="smashSound" src="pingas.mp3" preload="auto"></audio>
<script>
let score = 0;
let cps = 0;
let botCount = 0;
let drillCount = 0;
const costs = { bot: 10, drill: 50 };
const rates = { bot: 1, drill: 5 };

const counterEl = document.getElementById('counter');
const clickCountEl = document.getElementById('click-count');
const statsEl = document.getElementById('stats');
const buyBotBtn = document.getElementById('buyBot');
const buyDrillBtn = document.getElementById('buyDrill');
const clickerBtn = document.getElementById('clicker');
let clickCount = 0;
const scoreSamples = [{ score: 0, time: performance.now() }];

function format(value) {
    return Math.floor(value);
}

function updateUI() {
    const now = performance.now();
    scoreSamples.push({ score, time: now });
    while (scoreSamples.length > 1 && now - scoreSamples[0].time > 1000) {
        scoreSamples.shift();
    }

    const firstSample = scoreSamples[0];
    const elapsedSeconds = Math.max((now - firstSample.time) / 1000, 0.001);
    const measuredCps = (score - firstSample.score) / elapsedSeconds;

    counterEl.textContent = format(score);
    clickCountEl.textContent = `Clicks: ${clickCount}`;
    statsEl.textContent = `CPS: ${format(measuredCps)}`;
    buyBotBtn.textContent = `Buy Robot Assistant (${costs.bot})`;
    buyDrillBtn.textContent = `Buy Drill Rig (${costs.drill})`;
    buyBotBtn.disabled = score < costs.bot;
    buyDrillBtn.disabled = score < costs.drill;
}

const sprite = new Image();
sprite.src = 'robotnikhead.png';
sprite.onload = () => {
    clickerBtn.classList.add('sprite-button');
};

const robotIconsEl = document.getElementById('robot-icons');
const drillIconsEl = document.getElementById('drill-icons');

function updateIconsDisplay(container, count, emoji) {
    container.innerHTML = '';
    if (count === 0) return;
    
    const maxIcons = 8;
    const iconsToShow = Math.min(count, maxIcons);
    
    let fontSize = 'normal';
    if (count > 8) fontSize = 'small';
    if (count > 15) fontSize = 'tiny';
    
    for (let i = 0; i < iconsToShow; i++) {
        const icon = document.createElement('div');
        icon.className = `icon ${fontSize !== 'normal' ? fontSize : ''}`;
        icon.textContent = emoji;
        container.appendChild(icon);
    }
    
    if (count > maxIcons) {
        const overflow = document.createElement('div');
        overflow.className = 'overflow-text';
        overflow.textContent = '...';
        container.appendChild(overflow);
    }
}

clickerBtn.addEventListener('click', () => {
    score += 1;
    clickCount += 1;
    
    clickerBtn.classList.remove('zoom-click');
    void clickerBtn.offsetWidth;
    clickerBtn.classList.add('zoom-click');
    
    setTimeout(() => {
        clickerBtn.classList.remove('zoom-click');
    }, 300);
    
    const sound = document.getElementById('smashSound');
    sound.currentTime = 0;
    sound.play();
    updateUI();
});

buyBotBtn.addEventListener('click', () => {
    if (score < costs.bot) return;
    score -= costs.bot;
    botCount += 1;
    cps += rates.bot;
    costs.bot = Math.ceil(costs.bot * 1.25);
    updateIconsDisplay(robotIconsEl, botCount, '🤖');
    updateUI();
});

buyDrillBtn.addEventListener('click', () => {
    if (score < costs.drill) return;
    score -= costs.drill;
    drillCount += 1;
    cps += rates.drill;
    costs.drill = Math.ceil(costs.drill * 1.3);
    updateIconsDisplay(drillIconsEl, drillCount, '🏠');
    updateUI();
});

setInterval(() => {
    score += cps / 10;
    updateUI();
}, 100);

updateUI();
</script>
</body>
</html>
